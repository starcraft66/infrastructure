apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ./resources/ingress.yaml

generators:
- |-
  apiVersion: viaduct.ai/v1
  kind: ksops-exec
  metadata:
    name: secret-generator
  files:
  - ./secrets/netbox-secrets.yaml

configMapGenerator:
- name: netbox
  files:
  - ./config/configuration.py
  - ./config/netbox.yaml

namespace: netbox
