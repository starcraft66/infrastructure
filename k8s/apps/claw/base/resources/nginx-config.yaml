apiVersion: v1
kind: ConfigMap
metadata:
  name: openclaw-nginx-config
data:
  public.conf: |
    server {
        listen 12345;
        server_name _;

        location = /public {
            return 301 /public/;
        }

        location /public/ {
            alias /data/workspace/public_html/;
            autoindex on;
        }

        location = /healthz {
            access_log off;
            return 200 "ok\n";
        }
    }
