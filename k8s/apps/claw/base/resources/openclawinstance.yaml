apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  envFrom:
    - secretRef:
        name: openclaw-api-keys
  config:
    raw:
      channels:
        telegram:
          enabled: true
          dmPolicy: "pairing"
          groups:
            "*":
              requireMention: true
      agents:
        defaults:
          model:
            fallbacks:
            - openai-codex/gpt-5.4
            primary: zai/glm-5
          models:
            zai/glm-4.7: {}
            zai/glm-5:
              alias: GLM
            zai/glm-5-turbo: {}
      models:
        providers:
          zai:
            baseUrl: https://api.z.ai/api/coding/paas/v4
            models:
            - contextWindow: 204800
              cost:
                cacheRead: 0
                cacheWrite: 0
                input: 0
                output: 0
              id: glm-5
              input:
              - text
              maxTokens: 131072
              name: GLM-5
              reasoning: true
            - contextWindow: 204800
              cost:
                cacheRead: 0
                cacheWrite: 0
                input: 0
                output: 0
              id: glm-4.7
              input:
              - text
              maxTokens: 131072
              name: GLM-4.7
              reasoning: true
            - contextWindow: 204800
              cost:
                cacheRead: 0
                cacheWrite: 0
                input: 0
                output: 0
              id: glm-5-turbo
              input:
              - text
              maxTokens: 131072
              name: GLM-5-Turbo
              reasoning: true
  runtimeDeps:
    pnpm: true
    python: true
  chromium:
    enabled: true
    persistence:
      enabled: true
      size: "1Gi"
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - config
      - envVars
      - workspaceFiles
  workspace:
    initialDirectories:
      - public_html
  sidecars:
    - name: public-html
      image: nginx:1.29.6
      ports:
        - containerPort: 12345
      volumeMounts:
        - name: data
          mountPath: /data
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
          readOnly: true
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      resources:
        requests:
          cpu: "50m"
          memory: "32Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
  sidecarVolumes:
    - name: nginx-config
      configMap:
        name: openclaw-nginx-config
    - name: nginx-cache
      emptyDir: {}
    - name: nginx-run
      emptyDir: {}
  storage:
    persistence:
      enabled: true
      size: 10Gi
  security:
    networkPolicy:
      allowedIngressNamespaces:
        - traefik
  networking:
    service:
      ports:
        - name: gateway
          port: 18789
          targetPort: 18790
        - name: canvas
          port: 18793
          targetPort: 18794
        - name: chromium
          port: 9222
          targetPort: 9222
        - name: metrics
          port: 9090
          targetPort: 9090
        - name: public-html
          port: 12345
          targetPort: 12345
    ingress:
      enabled: true
      className: traefik
      annotations:
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        traefik.ingress.kubernetes.io/router.middlewares: traefik-forward-auth@kubernetescrd
        traefik.ingress.kubernetes.io/router.tls: "true"
        external-dns.alpha.kubernetes.io/target: "traefik.k8s.305-1700.tdude.co"
      hosts:
        - host: claw.tdude.co
          paths:
            - path: /
      tls:
        - hosts:
            - claw.tdude.co
          secretName: claw-ingress-tls
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
