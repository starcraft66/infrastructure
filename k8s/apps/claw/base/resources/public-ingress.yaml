apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openclaw-public
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: claw-openclaw-public-basic-auth@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/target: "traefik.k8s.305-1700.tdude.co"
spec:
  ingressClassName: traefik
  rules:
    - host: claw.tdude.co
      http:
        paths:
          - path: /public
            pathType: Prefix
            backend:
              service:
                name: openclaw
                port:
                  number: 12345
  tls:
    - hosts:
        - claw.tdude.co
      secretName: claw-ingress-tls
