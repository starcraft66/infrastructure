apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ./resources/volume.yaml
- ./resources/ingress.yaml

namespace: ircclient

configMapGenerator:
- name: thelounge-permissions
  literals: &perms
  - "PUID=1000"
  - "PGID=1000"
  - "TZ=America/Toronto"
- name: znc-permissions
  literals: *perms
- name: thelounge-config
  files:
  - "config.js=./config/thelounge.js"

images:
- name: lscr.io/linuxserver/thelounge
  digest: sha256:61d22410f1f9b4bf8422d49473f204dd166400381f8d0ab863f8aca94ff90f0b
- name: lscr.io/linuxserver/znc
  digest: sha256:d1a78cc0edf2fc856b482d8fd0f7b387301452c694d0f49a870eaa8472a4d8a7