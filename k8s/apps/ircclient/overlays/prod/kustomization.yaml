apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ./resources/volume.yaml
- ./resources/ingress.yaml

namespace: ircclient

configMapGenerator:
- name: thelounge-permissions
  literals: &perms
  - "PUID=1000"
  - "PGID=1000"
  - "TZ=America/Toronto"
- name: znc-permissions
  literals: *perms
- name: thelounge-config
  files:
  - "config.js=./config/thelounge.js"

images:
- name: lscr.io/linuxserver/thelounge
  digest: sha256:66f5c16d009f2949aa01d4935e1bf97f1c85dfe3bbce296bf0d9f6498f596c06
- name: lscr.io/linuxserver/znc
  digest: sha256:b0d54f5ce3f88e2f42af4a95784ebbea94ddb037bef59cba7cde05b196c4bbe6