apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ./resources/volume.yaml
- ./resources/ingress.yaml

namespace: ircclient

configMapGenerator:
- name: thelounge-permissions
  literals: &perms
  - "PUID=1000"
  - "PGID=1000"
  - "TZ=America/Toronto"
- name: znc-permissions
  literals: *perms
- name: thelounge-config
  files:
  - "config.js=./config/thelounge.js"

images:
- name: lscr.io/linuxserver/thelounge
  digest: sha256:52e89facb130597ea868cbea41b5b27c108e3a7372b58e75f84729aa1ed8dcfe
- name: lscr.io/linuxserver/znc
  digest: sha256:d11d81a551a78a4e07e47a6ee6e0e7c6faaf5c668f37143271e10c1774b94e7b