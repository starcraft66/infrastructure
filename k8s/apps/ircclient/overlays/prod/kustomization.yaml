apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- ./resources/volume.yaml
- ./resources/ingress.yaml

namespace: ircclient

configMapGenerator:
- name: thelounge-permissions
  literals: &perms
  - "PUID=1000"
  - "PGID=1000"
  - "TZ=America/Toronto"
- name: znc-permissions
  literals: *perms
- name: thelounge-config
  files:
  - "config.js=./config/thelounge.js"

images:
- name: lscr.io/linuxserver/thelounge
  digest: sha256:ef9d8adaacf89eae648a478ce5f1688f002c48acfc81e3d9ac923ece1187ae91
- name: lscr.io/linuxserver/znc
  digest: sha256:9dcdf846b68fe98dc6b623774c6e1e06241df24047c929e9ae50d0ed42d9ae66