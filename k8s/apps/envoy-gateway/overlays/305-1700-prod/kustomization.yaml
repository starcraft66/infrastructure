apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ./resources/dummy-http.yaml
- ./resources/gateway-config.yaml
- ./resources/oidc-security.yaml

generators:
- |-
  apiVersion: viaduct.ai/v1
  kind: ksops-exec
  metadata:
    name: secret-generator
  files:
  - ./secrets/pocket-id-client-secret.yaml

namespace: envoy-gateway