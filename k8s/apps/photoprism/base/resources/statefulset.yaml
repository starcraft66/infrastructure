---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: photoprism
spec:
  serviceName: photoprism
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: photoprism
  template:
    metadata:
      labels:
        app.kubernetes.io/name: photoprism
    spec:
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: photoprism
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
      containers:
      - name: photoprism
        image: "photoprism/photoprism:latest"
        imagePullPolicy: IfNotPresent
        # resources:
        #   limits:
        #     memory: 8Gi
        #   requests:
        #     cpu: "4"
        #     memory: 8Gi
        # startupProbe guards the potentially long first-boot DB migration/indexing
        # window without blocking readiness once the server is actually serving.
        # 60 * 60s = up to 60 min for startup before liveness/readiness take over.
        startupProbe:
          httpGet:
            path: /
            port: http
            httpHeaders:
            - name: Host
              value: "photos.tdude.co"
          periodSeconds: 60
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 60
        livenessProbe:
          httpGet:
            path: /
            port: http
            httpHeaders:
            - name: Host
              value: "photos.tdude.co"
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: http
            httpHeaders:
            - name: Host
              value: "photos.tdude.co"
          periodSeconds: 10
          timeoutSeconds: 5
          successThreshold: 1
          failureThreshold: 3
        envFrom:
        - configMapRef:
            name: photoprism-config
        - secretRef:
            name: photoprism-secrets
        ports:
        - name: http
          containerPort: 2342
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /photoprism/storage
          subPath: storage
        - name: data
          mountPath: /photoprism/originals
          subPath: originals
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: photoprism-data
