apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ./resources/ingress.yaml
- ./plex
- ./sonarr
- ./radarr
- ./lidarr
- ./jackett
- ./prowlarr
- ./qbittorrent
- ./tautulli
- ./overseerr
- ./jellyfin

namespace: mediaserver

generators:
- ./generators/secrets-generator.yaml

patchesStrategicMerge:
- ./patches/pvc-plex-data.yaml

configMapGenerator:
- name: plex-env-vars
  literals:
  - TZ=America/Toronto
  - ADVERTISE_IP=https://plex.tdude.co/
- name: mediaserver-permissions
  literals:
  - PUID=1014
  - PGID=1015

images:
- name: ghcr.io/jellyfin/jellyfin
  newTag: "10.11.1@sha256:66f8c685241cb6d1611ddf90c593d47f18fb851d07d696b821280497f6f2b5b7"