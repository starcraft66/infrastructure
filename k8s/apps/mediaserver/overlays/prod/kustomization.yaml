apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- ../../base
- ./resources/ingress.yaml
- ./plex
- ./sonarr
- ./radarr
- ./lidarr
- ./jackett
- ./prowlarr
- ./qbittorrent
- ./tautulli
- ./overseerr
- ./jellyfin
- ./wizarr

namespace: mediaserver

generators:
- |-
  apiVersion: viaduct.ai/v1
  kind: ksops-exec
  metadata:
    name: secret-generator
  files:
  - ./secrets/plex-claim.yaml

patchesStrategicMerge:
- ./patches/pvc-plex-data.yaml

configMapGenerator:
- name: plex-env-vars
  literals:
  - TZ=America/Toronto
  - ADVERTISE_IP=https://plex.tdude.co/
- name: mediaserver-permissions
  literals:
  - PUID=1014
  - PGID=1015
